<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lacerda Conveniência</title>

<link rel="manifest" href="manifest.json">

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header {text-align:center;padding:15px;background:#000;}
button {background:#25D366;border:none;padding:8px;color:white;border-radius:6px;margin:3px;}
.produtos {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:#1c1c1c;padding:10px;border-radius:10px;text-align:center;}
.card img {width:100%;border-radius:8px;}
.carrinho {position:fixed;bottom:0;width:100%;background:#1c1c1c;padding:10px;}
input {width:95%;padding:8px;margin-top:5px;border-radius:5px;border:none;}
</style>
</head>

<body>

<header>
<h2>🍻 Lacerda Conveniência</h2>
<p id="status"></p>
<button id="instalar" style="display:none;">📲 Instalar App</button>
</header>

<input id="nome" placeholder="Seu nome">

<section class="produtos" id="produtos"></section>

<div class="carrinho">
<div id="lista"></div>
<strong>Total: R$ <span id="total">0</span></strong><br>
<input id="endereco" placeholder="Endereço">
<input id="pix" placeholder="Chave Pix (opcional)">
<button onclick="finalizar()">Finalizar Pedido</button>
</div>

<script>
let deferredPrompt;
const btnInstall = document.getElementById("instalar");

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block";
});

btnInstall.addEventListener("click", ()=>{
  deferredPrompt.prompt();
});

const produtos = [
 {nome:"Skol",preco:4,img:"https://images.unsplash.com/photo-1584225064785-c62a8b43d148"},
 {nome:"Império",preco:4,img:"https://images.unsplash.com/photo-1608270586620-248524c67de9"},
 {nome:"Petra",preco:4,img:"https://images.unsplash.com/photo-1514361892635-e9558d11e5c9"}
];

let carrinho = JSON.parse(localStorage.getItem("carrinho"))||{};

function render(){
 let html="";
 produtos.forEach(p=>{
  html+=`
  <div class="card">
    <img src="${p.img}">
    <h3>${p.nome}</h3>
    <p>R$ ${p.preco}</p>
    <button onclick="add('${p.nome}',${p.preco})">+</button>
    <button onclick="removeItem('${p.nome}')">-</button>
  </div>`;
 });
 document.getElementById("produtos").innerHTML=html;
}

function salvar(){localStorage.setItem("carrinho",JSON.stringify(carrinho));}

function add(n,p){if(!carrinho[n])carrinho[n]={qtd:0,preco:p};carrinho[n].qtd++;atualizar();}
function removeItem(n){if(carrinho[n]){carrinho[n].qtd--;if(carrinho[n].qtd<=0)delete carrinho[n];}atualizar();}

function atualizar(){
 let total=0;let html="";
 for(let i in carrinho){
  let d=carrinho[i];let sub=d.qtd*d.preco;total+=sub;
  html+=`${i} x${d.qtd} = R$ ${sub}<br>`;
 }
 document.getElementById("lista").innerHTML=html;
 document.getElementById("total").innerText=total;
 salvar();
}

function finalizar(){
 let nome=document.getElementById("nome").value;
 let endereco=document.getElementById("endereco").value;
 let pix=document.getElementById("pix").value;

 let msg="🛒 Pedido:%0A";
 msg+="👤 "+nome+"%0A";

 for(let i in carrinho){
  let d=carrinho[i];
  msg+=`${i} x${d.qtd}%0A`;
 }

 msg+=`Total: R$ ${document.getElementById("total").innerText}%0A`;
 msg+=`📍 ${endereco}%0A`;

 if(pix) msg+=`💳 Pix: ${pix}`;

 window.open("https://wa.me/559696981314137?text="+msg);
}

render();
atualizar();

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
